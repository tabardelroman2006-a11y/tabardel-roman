<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site en maintenance — Roman Tabardel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F4F4F4;
      color: #1A1A1A;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1B3A6B;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Barlow Condensed', 'Impact', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      color: #1A1A1A;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #6B6B6B;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    a.cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1B3A6B;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      transition: opacity 0.2s;
    }

    a.cta:hover { opacity: 0.85; }

    .icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 12px;
      color: #ACACAC;
    }
  </style>
</head>
<body>

  <span class="badge">Maintenance en cours</span>

  <h1>On revient<br>très vite.</h1>

  <p>
    Le site est temporairement en maintenance.<br>
    Pour un devis ou toute question, appelez-moi directement.
  </p>

  <a class="cta" href="tel:0769341123">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
    07 69 34 11 23
  </a>

  <footer>Roman Tabardel — Création de sites web</footer>

</body>
</html>
